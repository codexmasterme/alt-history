<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <meta name="referrer" content="no-referrer">
    <title>青史另说 - 汉朝历史分叉树</title>
    <!-- 使用原生系统宋体/明体，避免微信跨域字体下载导致截图引擎卡死 -->
    <link rel="stylesheet" href="style.css?v=20260630_22">
</head>
<body>
    <div id="app">
        <!-- 装饰背景效果 -->
        <div class="bg-gradient"></div>
        <div class="bg-noise"></div>
        <div class="bg-texture"></div>

        <!-- 开场介绍弹窗 -->
        <div id="intro-modal" class="intro-modal">
            <div class="intro-card">
                <div class="intro-title">青史另说</div>
                <div class="intro-subtitle">一念千史</div>
                <div class="intro-divider"></div>
                <div class="intro-body">
                    在历史的关键岔口，若当初选了另一条路，会怎样？<br><br>
                    从楚汉相争到王朝更替，亲手推演每一个「如果」，解锁不一样的结局。<br><br>
                    你的一个选择，可能改变整个王朝的命运。
                </div>
                <button id="intro-confirm-btn" class="intro-btn">开始推演</button>
            </div>
        </div>

        <!-- 主内容区 -->
        <div id="game-container">
            <!-- 顶部进度条 -->
            <div class="progress-bar fade-element">
                <span id="step-label"></span>
                <div class="dots-container" id="dots-container"></div>
            </div>

            <header class="title-section fade-element">
                <div class="title-decorator left"></div>
                <div class="title-content">
                    <div id="year" class="year-stamp"></div>
                    <h1 id="title"></h1>
                </div>
                <div class="title-decorator right"></div>
            </header>
            
            <main>
                <div id="setup-text" class="fade-element">
                    <!-- 情境文字将渲染在这里 -->
                </div>
            </main>
            
            <footer id="options-container" class="fade-element">
                <!-- 选项按钮将渲染在这里 -->
            </footer>
        </div>

        <!-- 结局覆盖层 -->
        <div id="ending-screen" class="hidden fade-element brutal-mode">
            <div id="share-card" class="brutal-share-card">
                <!-- 印章特效 -->
                <div id="brutal-stamp" class="brutal-stamp hidden">【<span id="stamp-label"></span>】认证</div>
                
                <!-- 核心金句 -->
                <div class="brutal-quote" id="brutal-quote">即使满盘皆输，老子也要站着死！</div>
                
                <!-- 结局名称与副标题 -->
                <div class="brutal-title-box">
                    <div class="brutal-title" id="ending-title">西楚短世</div>
                    <div class="brutal-desc" id="ending-desc"></div>
                </div>
                
                <!-- 数据雷达条 -->
                <div class="brutal-stats-container">
                    <div class="brutal-stat-row">
                        <div class="stat-labels"><span>集权</span><span>分封</span></div>
                        <div class="stat-bar-bg"><div class="stat-bar-fill" id="bar-cf"></div></div>
                    </div>
                    <div class="brutal-stat-row">
                        <div class="stat-labels"><span>激进</span><span>保守</span></div>
                        <div class="stat-bar-bg"><div class="stat-bar-fill" id="bar-rs"></div></div>
                    </div>
                    <div class="brutal-stat-row">
                        <div class="stat-labels"><span>强硬</span><span>妥协</span></div>
                        <div class="stat-bar-bg"><div class="stat-bar-fill" id="bar-ap"></div></div>
                    </div>
                    <div class="brutal-stat-row">
                        <div class="stat-labels"><span>权谋</span><span>军事</span></div>
                        <div class="stat-bar-bg"><div class="stat-bar-fill" id="bar-im"></div></div>
                    </div>
                </div>
                
                <!-- 底部统计 -->
                <div class="brutal-footer">
                    共 <span id="stat-steps" class="highlight-yellow"></span> 步解锁 · 全网稀有度 <span id="stat-rarity" class="highlight-yellow"></span>%
                </div>

                <!-- 大结局图鉴收集进度 -->
                <div class="brutal-collection" id="ending-collection-progress">大结局图鉴收集进度：0 / 16</div>

                <div class="brutal-qrcode-section">
                    <div class="brutal-watermark">扫码入局 测测你的历史人格</div>
                    <div class="qr-code" id="qrCodeContainer"></div>
                </div>
            </div>

            <!-- 操作按钮 -->
            <div class="actions">
                <button id="save-btn" class="action-btn brutal-btn">保存海报</button>
                <button id="rewind-btn" class="action-btn rewind-btn brutal-btn hidden">时空折跃</button>
                <button id="restart-btn" class="action-btn restart-btn brutal-btn">再来一局</button>
            </div>
        </div>
    </div>

    <!-- 依次引入数据和主逻辑，不再使用外部 CDN，全部本地化以防止微信拦截 -->
    <script src="html2canvas.min.js?v=1"></script>
    <script src="qrcode.min.js?v=1"></script>
    <script src="data.js?v=20260630_22"></script>
    <script src="image_data.js?v=20260630_22"></script>
    <script src="main.js?v=20260630_23"></script>
</body>
</html>
